<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.92);
            --line: rgba(148, 163, 184, 0.2);
            --text: #e2e8f0;
            --soft: #94a3b8;
            --action: #38bdf8;
            --error: #f87171;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.18), transparent 28%),
                linear-gradient(180deg, #020617, #111827);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .panel {
            width: min(560px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.9rem, 4vw, 2.5rem);
        }
        p {
            color: var(--soft);
            line-height: 1.6;
        }
        .form-group {
            margin-top: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
        }
        button, a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .primary {
            background: linear-gradient(135deg, var(--action), #0ea5e9);
            color: #082f49;
        }
        .secondary {
            background: rgba(148, 163, 184, 0.14);
            color: var(--text);
        }
        .message {
            min-height: 24px;
            margin-top: 16px;
            font-size: 0.95rem;
        }
        .helper-text {
            margin-top: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Forgot your password?</h1>
        <p>
            Enter your username and the recovery email saved at signup. This app sends the reset link by email,
            and the link automatically uses the current deployed domain.
        </p>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" required>
            </div>
            <div class="form-group">
                <label for="email">Recovery Email</label>
                <input id="email" type="email" placeholder="you@example.com" required>
                <div class="helper-text">Use the same recovery email you saved during signup.</div>
            </div>
            <div class="actions">
                <button class="primary" type="submit">Email Reset Link</button>
                <a class="secondary" href="index.html">Back to Login</a>
            </div>
        </form>

        <div id="message" class="message"></div>
    </main>

    <script>
        const form = document.getElementById('forgotPasswordForm');
        const messageEl = document.getElementById('message');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            messageEl.textContent = '';

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;

            try {
                const response = await fetch('/password-reset/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });

                const data = await response.json();
                messageEl.style.color = response.ok ? '#4ade80' : '#f87171';
                messageEl.textContent = response.ok ? data.message : data.error;
            } catch (error) {
                messageEl.style.color = '#f87171';
                messageEl.textContent = 'Could not connect to the server.';
            }
        });
    </script>
</body>
</html>
