<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Authentication</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 320px;
            text-align: center;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            background-color: #333;
            border: none;
            color: white;
            font-weight: bold;
        }
        .tab.active {
            background-color: #007bff;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }
        button.submit-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button.submit-btn:hover {
            background-color: #0056b3;
        }
        .helper-link {
            display: inline-block;
            margin-top: 14px;
            color: #7dd3fc;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .helper-link:hover {
            text-decoration: underline;
        }
        .helper-text {
            margin-top: 8px;
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: left;
        }
        .hidden {
            display: none;
        }
        #message {
            margin-top: 15px;
            font-size: 0.9em;
            min-height: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <form id="loginForm">
        <h2>Player Login</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required>
        </div>
        <button type="submit" class="submit-btn">Enter Game</button>
        <a class="helper-link" href="forgot-password.html">Forgot password?</a>
    </form>

    <form id="signupForm" class="hidden">
        <h2>Register Player</h2>
        <div class="form-group">
            <label>Choose Username</label>
            <input type="text" id="signupUsername" required>
        </div>
        <div class="form-group">
            <label>Recovery Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" required>
            <div class="helper-text">Use any email address you control. Password recovery works through email only.</div>
        </div>
        <div class="form-group">
            <label>Create Password</label>
            <input type="password" id="signupPassword" required>
        </div>
        <button type="submit" class="submit-btn">Create Account</button>
    </form>

    <div id="message"></div>
</div>

<script>
    const messageEl = document.getElementById('message');

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((item) => item.classList.remove('active'));
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('signupForm').classList.add('hidden');
        messageEl.textContent = '';
        messageEl.style.color = 'white';

        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginForm').classList.remove('hidden');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('signupForm').classList.remove('hidden');
        }
    }

    async function sendJson(endpoint, payload) {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();
        return { response, data };
    }

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();

        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const { response, data } = await sendJson('/login', { username, password });

            if (response.ok) {
                messageEl.style.color = '#4ade80';
                messageEl.textContent = data.message;
                localStorage.setItem('currentUser', JSON.stringify({
                    userId: data.userId,
                    username: data.username || username,
                    email: data.email || null
                }));
                window.location.href = 'login-page.html';
            } else {
                messageEl.style.color = '#f87171';
                messageEl.textContent = data.error;
            }
        } catch (error) {
            messageEl.style.color = '#f87171';
            messageEl.textContent = 'Could not connect to the server.';
        }
    });

    document.getElementById('signupForm').addEventListener('submit', async (event) => {
        event.preventDefault();

        const username = document.getElementById('signupUsername').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;

        try {
            const { response, data } = await sendJson('/signup', { username, email, password });

            messageEl.style.color = response.ok ? '#4ade80' : '#f87171';
            messageEl.textContent = response.ok
                ? `${data.message} Your recovery email has been saved.`
                : data.error;
        } catch (error) {
            messageEl.style.color = '#f87171';
            messageEl.textContent = 'Could not connect to the server.';
        }
    });
</script>
</body>
</html>
