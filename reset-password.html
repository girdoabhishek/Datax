<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.92);
            --line: rgba(148, 163, 184, 0.18);
            --text: #e5e7eb;
            --soft: #9ca3af;
            --primary: #f59e0b;
            --error: #f87171;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(245, 158, 11, 0.18), transparent 28%),
                linear-gradient(180deg, #030712, #111827);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .panel {
            width: min(560px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.9rem, 4vw, 2.5rem);
        }
        p {
            color: var(--soft);
            line-height: 1.6;
        }
        .form-group {
            margin-top: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(17, 24, 39, 0.95);
            color: var(--text);
        }
        button, a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .primary {
            background: linear-gradient(135deg, var(--primary), #f97316);
            color: #431407;
        }
        .secondary {
            background: rgba(148, 163, 184, 0.14);
            color: var(--text);
        }
        .message {
            min-height: 24px;
            margin-top: 16px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Choose a new password</h1>
        <p>Open this page from your reset link, then set a new password for your account.</p>

        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" required>
            </div>
            <div class="form-group">
                <label for="token">Reset Token</label>
                <input id="token" type="text" required>
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input id="newPassword" type="password" minlength="6" required>
            </div>
            <div class="actions">
                <button class="primary" type="submit">Reset Password</button>
                <a class="secondary" href="index.html">Back to Login</a>
            </div>
        </form>

        <div id="message" class="message"></div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const usernameInput = document.getElementById('username');
        const tokenInput = document.getElementById('token');
        const form = document.getElementById('resetPasswordForm');
        const messageEl = document.getElementById('message');

        usernameInput.value = params.get('username') || '';
        tokenInput.value = params.get('token') || '';

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            try {
                const response = await fetch('/password-reset/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        token: tokenInput.value,
                        newPassword: document.getElementById('newPassword').value,
                    })
                });

                const data = await response.json();
                messageEl.style.color = response.ok ? '#4ade80' : '#f87171';
                messageEl.textContent = response.ok ? data.message : data.error;

                if (response.ok) {
                    form.reset();
                    usernameInput.value = '';
                    tokenInput.value = '';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1800);
                }
            } catch (error) {
                messageEl.style.color = '#f87171';
                messageEl.textContent = 'Could not connect to the server.';
            }
        });
    </script>
</body>
</html>
